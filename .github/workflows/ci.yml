name: CI

on:
  pull_request:

env:
  MIX_ENV: test

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # ash_postgres generates `MERGE ... RETURNING` for upsert actions (e.g.
      # Token.store_token, Membership.accept_invite); Postgres only supports
      # RETURNING on MERGE from v17 onward. Do not downgrade to 16 (CLAUDE.md
      # says 16, but that's stale — 17+ is actually required).
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.4.1"

      - name: Restore deps/build cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Run credo
        run: mix credo --strict

      - name: Run tests
        run: mix test
